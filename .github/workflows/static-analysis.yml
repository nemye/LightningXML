name: Static Analysis

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy \
            cmake \
            ninja-build

      - name: Configure CMake
        run: |
          cmake \
            -S . \
            -B build \
            -G Ninja \
            -DLIGHTNINGXML_BUILD_BENCHMARKS=OFF \
            -DLIGHTNINGXML_BUILD_TESTS=ON \
            -DLIGHTNINGXML_BUILD_CODEGEN=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build test targets
        run: |
          cmake --build build

      - name: Run clang-tidy
        run: |
          clang-tidy \
            -p build \
            $(find include test tools \
              \( -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" \) \
              ! -path "test/bench_*")


  sanitizers:
    name: ASAN UBSAN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure sanitizer build
        run: |
          cmake \
            -S . \
            -B build-sanitize \
            -DCMAKE_BUILD_TYPE=Debug \
            -DLIGHTNINGXML_BUILD_TESTS=ON \
            -DLIGHTNINGXML_BUILD_BENCHMARKS=OFF \
            -DLIGHTNINGXML_ENABLE_SANITIZERS=ON

      - name: Build tests
        run: |
          cmake --build build-sanitize --parallel

      - name: Run tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          ctest \
            --test-dir build-sanitize \
            --output-on-failure